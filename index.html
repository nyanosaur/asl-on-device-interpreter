<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignSpeak: ASL Real-Time Interpreter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SignSpeak</h1>
        <p class="subtitle">Real-time Static ASL Alphabet Interpreter (A-Y, excluding J)</p>
        
        <div class="interface-grid">
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div id="loading-overlay" class="overlay">
                    <div class="spinner"></div>
                    <p id="status-text">Loading AI Models...</p>
                </div>
            </div>
            
            <div class="output-container">
                <div class="card">
                    <h3>Detected Letter</h3>
                    <div id="detected-letter" class="letter-display">-</div>
                </div>
                
                <div class="card console-card">
                    <h3>System Logs</h3>
                    <div id="console-log" class="console-box">Initializing pipeline...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOAD LOCAL AI FRAMEWORKS -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
