<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL Alphabet Interpreter</title>
    <!-- Import Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Load TensorFlow.js and the handpose model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
</head>
<body>
    <div class="container">
        <h1>ASL Alphabet Interpreter</h1>
        
        <div class="main-content">
            <!-- Left Panel: Webcam Video & Canvas Layer -->
            <div class="video-panel">
                <div class="video-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="output"></canvas>
                    <div id="loading-overlay" class="overlay">
                        <div class="spinner"></div>
                        <p id="loading-text">Loading MediaPipe Handpose...</p>
                    </div>
                </div>
                <div class="controls">
                    <button id="toggle-cam" class="btn disabled" disabled>
                        <span class="material-icons">videocam_off</span>
                        Start Camera
                    </button>
                </div>
            </div>

            <!-- Right Panel: Real-time Output & Visual Guides -->
            <div class="side-panel">
                <div class="card prediction-card">
                    <h2>Detected Letter</h2>
                    <div id="prediction-output">—</div>
                    <div class="confidence-container">
                        <div class="confidence-label">Confidence</div>
                        <div class="progress-bar">
                            <div id="confidence-bar" style="width: 0%"></div>
                        </div>
                        <span id="confidence-text">0%</span>
                    </div>
                </div>

                <div class="card status-card">
                    <h2>System Status</h2>
                    <ul class="status-list">
                        <li id="status-model"><span class="indicator red"></span>Model: Core Unloaded</li>
                        <li id="status-fps"><span class="indicator gray"></span>FPS: --</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
